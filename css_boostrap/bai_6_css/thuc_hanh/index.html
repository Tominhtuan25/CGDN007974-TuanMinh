<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thực hành làm quen với CSS</title>
    <style>
        h1 {
            color: red;
            font-family: Tahoma;
            font-size: 40px;
        }

        p {
            color: yellow;
            font-family: Arial;
            font-size: 120%;
            border: 1px solid red;
            padding: 1px;
        }
        #element1 {
            color: blue;
        }
    </style>
</head>
<body>
<h1>Nam quốc sơn hà</h1>

<p>Nam quốc sơn hà Nam đế cư</p>
<p>Tiệt nhiên định phận tại thiên thư</p>
<p>Như hà nghịch lỗ lai xâm phạm</p>
<p>Nhữ đẳng hành khan thủ bại hư</p>
<p id = "element1">Như hà nghịch lỗ lai xâm phạm</p>
</body>
</html>
